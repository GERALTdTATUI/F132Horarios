<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" media="screen and (max-width: 800px)" href="./css/smallPC.css">
    <link rel="stylesheet" media="print" href="./css/printLayout.css" />
    
            <!-- WebAPP Manifest  And Icon-->
    <link rel="icon" href="./assets/icons/icon32.png">
    <link rel="manifest" href="./manifest.json">

            <!-- Scripts Externos -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>

    <!-- Scripts Internos -->
    <script src="parameters.local.js"></script>
    <script src="parameters.js"></script>

            <!-- Scrits de Teste -->

    <script>
        var FilterFlds, clssSz, fullData, /* clmnHdrs, */ lastEditedTime;

        (async function runBaseScripts() { let tblDt, agnds
            clssSz = await fetch('./scripts/classes.json');
            clssSz = await clssSz.json();

            // clmnHdrs = await fetch('parameters.json');
            // clmnHdrs = await clmnHdrs.json();
            lastEditedTime = await schLastEdited()
            $('#updtTime').text("Última Atualização: " + lastEditedTime);

            fullData = await schSrcs();
            // console.log(tsvDataArrays);

            FilterFlds = getFltrsFlds(fullData);
            
            $('#schAra').css('display', 'flex'); $('#ldS').remove();
            schCkFltrs(fullData, clssSz);

<body>
    
    <div class="ldScr" id="ldS">
        <img id="ldImg" class="loading" src="./assets/ldIcon/ld3.png">
        <p id="prctg">Carregando</p>
    </div>

    <div class="SearchAreaBkg" id="schAraBkg" hidden onclick="hideSrch(true)"></div>

    <div class="SearchArea" id="schAra">
        <img id="srcImg" onclick="hideSrch()" src="./assets/logos/searchIcon.png" hidden>
        
        <picture id="Flgs" class="Flogos">
            <source id="ftaLogoSt" media="(max-height: 560px)" srcset="./assets/logos/fatecLogoDarkShort.png">
            <img id="ftaLogo" src="./assets/logos/fatecLogoDark.png">
        </picture>

        <div class="prsnBox" id="prsnBox" onclick="$('#prsnBox').css('flex-direction', 'row')">
            <button id="bt-curso" class="btP" onclick="fndStdt()">Cursos</button>
            <button id="bt-professor" class="btP" onclick="fndTchr()">Professor</button>
            <button id="bt-sala" class="btP" onclick="fndClsR()">Sala</button>
            <button id="bt-materia" class="btP" onclick="fndClss()">Disciplina</button>
        </div>
        
        <!--    ÁREA DO ALUNO    -->
        <div class="sltAll" id="sltAll" hidden>
            <div class="select_beta" id="curso">
                <div class="option_selected_beta">-- Curso --</div>
                <div class="options_beta"></div>
                <input type="hidden" name="curso" value="0">
            </div>

            <div class="select_beta" id="semestre" data-disabled="true">
                <div class="option_selected_beta">-- Semestre --</div>
                <div class="options_beta"></div>
                <input type="hidden" name="semestre" value="0">
            </div>

            <div class="select_beta" id="turno" data-disabled="true">
                <div class="option_selected_beta">-- Período --</div>
                <div class="options_beta"></div>
                <input type="hidden" name="turno" value="0">
            </div>
            <!--    FIM DA ÁREA DO ALUNO   -->


            <!--    ÁREA DO PROFESSOR   -->
            <div class="select_beta" id="professor">
                <div class="option_selected_beta">-- Professor --</div>
                <div class="options_beta"></div>
                <input type="hidden" name="professor" value="0">
            </div>
            <!--    FIM DA ÁREA DO PROFESSOR   -->


            <!--    ÁREA POR SALA    -->
            <div class="select_beta" id="sala">
                <div class="option_selected_beta">-- Sala --</div>
                <div class="options_beta">
                    <!-- Função_beta -->
                    <div class="option_beta" data-value="Salas Livres">Salas Livres</div>
                </div>
                <input type="hidden" name="sala" value="0">
            </div>
            <!--    FIM DA ÁREA POR SALA   -->


            <!--    ÁREA POR DISCIPLINA    -->
            <div class="select_beta" id="materia">
                <div class="option_selected_beta">-- Disciplina --</div>
                <div class="options_beta"></div>
                <input type="hidden" name="materia" value="0">
            </div>
            <!--    FIM DA ÁREA POR DISCIPLINA   -->

            <!--    BOTÂO PARA SALVAR A PESQUISA -->
            <label id="svSch" hidden>
                <input id="svSchIpnt" type="checkbox" onclick="resetSavedSearch()">Salvar pesquisa
            </label>
        
        </div>

        <button class="fndBtn" id="fndBt" disabled hidden>Encontrar Horários</button>
    </div>

    <div class="menu">
        <input class="clrOpt" id="clr1" type="button" value="" onclick="chgPltt(0)">
        <input class="clrOpt" id="clr2" type="button" value="" onclick="chgPltt(1)">
        <input class="clrOpt" id="clr3" type="button" value="" onclick="chgPltt(2)">
        <input class="clrOpt" id="clr4" type="button" value="" onclick="chgPltt(3)">
        <input class="clrOpt" id="clr5" type="button" value="" onclick="chgPltt(4)">
        <input class="clrOpt" id="clr6" type="button" value="" onclick="chgPltt(5)">
        <div class="switch" onclick="chgTheme(this)">
            <div class="slider" id="sld1"></div>
        </div>

        <div class="spacer">    </div>

        <div id="lastChangeStatus">
            <p id="updtTime"></p>
        </div>
    </div>
